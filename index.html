<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>テクニカルアナリスト一次試験 〇×演習</title>
<style>
  :root{
    --bg:#0f172a; --panel:#1e293b; --panel2:#273449; --line:#334155;
    --txt:#e2e8f0; --muted:#94a3b8; --accent:#38bdf8;
    --ok:#22c55e; --ng:#ef4444; --maru:#f59e0b; --batsu:#60a5fa;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;background:var(--bg);color:var(--txt);
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",system-ui,sans-serif;line-height:1.7;}
  .wrap{max-width:760px;margin:0 auto;padding:16px;}
  header{text-align:center;padding:18px 8px 6px;}
  header h1{font-size:1.25rem;margin:0 0 4px;}
  header p{margin:0;color:var(--muted);font-size:.85rem;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;margin:14px 0;}
  .btn{display:block;width:100%;border:none;border-radius:12px;padding:14px;
    font-size:1rem;font-weight:700;cursor:pointer;margin:8px 0;color:#0b1220;transition:transform .05s, filter .15s;}
  .btn:active{transform:scale(.99);}
  .btn.primary{background:var(--accent);}
  .btn.sub{background:var(--panel2);color:var(--txt);border:1px solid var(--line);}
  .btn:disabled{opacity:.5;cursor:default;}
  .modes{display:grid;gap:10px;margin-top:8px;}
  .note{color:var(--muted);font-size:.85rem;}
  .topbar{display:flex;justify-content:space-between;align-items:center;font-size:.85rem;color:var(--muted);margin-bottom:6px;}
  .bar{height:8px;background:var(--panel2);border-radius:99px;overflow:hidden;margin-bottom:14px;}
  .bar > i{display:block;height:100%;background:var(--accent);width:0;transition:width .25s;}
  .tag{display:inline-block;font-size:.72rem;background:var(--panel2);color:var(--accent);
    border:1px solid var(--line);border-radius:99px;padding:2px 10px;margin-bottom:10px;}
  .qtext{font-size:1.12rem;font-weight:600;margin:6px 0 18px;min-height:3em;}
  .ox{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .ox button{border:none;border-radius:14px;padding:22px 0;font-size:1.8rem;font-weight:800;cursor:pointer;
    color:#0b1220;transition:transform .05s, filter .15s;}
  .ox .maru{background:var(--maru);}
  .ox .batsu{background:var(--batsu);}
  .ox button:active{transform:scale(.97);}
  .ox button:disabled{opacity:.45;cursor:default;}
  .judge{font-size:1.3rem;font-weight:800;text-align:center;margin:12px 0 4px;}
  .judge.ok{color:var(--ok);} .judge.ng{color:var(--ng);}
  .exp{background:var(--panel2);border-radius:12px;padding:14px;margin-top:10px;font-size:.95rem;}
  .exp b{color:var(--accent);}
  .ans-line{font-weight:700;margin-bottom:6px;}
  .hidden{display:none;}
  .score{font-size:2.4rem;font-weight:800;text-align:center;color:var(--accent);}
  .score small{display:block;font-size:.9rem;color:var(--muted);font-weight:400;margin-top:4px;}
  .review-item{border-top:1px solid var(--line);padding:12px 0;font-size:.9rem;}
  .review-item .qq{font-weight:600;}
  .review-item .meta{font-size:.78rem;color:var(--muted);margin-top:4px;}
  .wrong{color:var(--ng);} .right{color:var(--ok);}
  footer{text-align:center;color:var(--muted);font-size:.72rem;padding:20px 0 30px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>テクニカルアナリスト一次試験 〇×演習</h1>
    <p>100論点 × 〇版／×版 ＝ 計200問・解説つき</p>
  </header>

  <div id="home" class="card">
    <p class="note" style="margin-top:0;">同じ論点でも、開くたびに「正しい文（〇）」と「誤った文（×）」が入れ替わって出題されます。位置で答えを覚えられない作りです。出題範囲はテキスト全38項目に対応。</p>
    <div class="modes">
      <button class="btn primary" onclick="start('flip')">① 全論点100問（毎回〇×が入れ替わる）</button>
      <button class="btn sub" onclick="start('all200')">② 全200問チャレンジ（〇版・×版すべて）</button>
      <button class="btn sub" onclick="start('mini')">③ ミニテスト20問（ランダム）</button>
      <button class="btn sub" id="wrongBtn" onclick="start('wrong')">④ 前回間違えた論点だけ</button>
    </div>
  </div>

  <div id="quiz" class="card hidden">
    <div class="topbar">
      <span id="counter">1 / 100</span>
      <span id="liveScore">正解 0</span>
    </div>
    <div class="bar"><i id="prog"></i></div>
    <span class="tag" id="cat">カテゴリ</span>
    <div class="qtext" id="qtext">問題文</div>
    <div class="ox">
      <button class="maru" id="bMaru" onclick="answer(true)">〇</button>
      <button class="batsu" id="bBatsu" onclick="answer(false)">×</button>
    </div>
    <div id="feedback" class="hidden">
      <div class="judge" id="judge"></div>
      <div class="exp">
        <div class="ans-line" id="ansLine"></div>
        <div id="expText"></div>
      </div>
      <button class="btn primary" id="nextBtn" onclick="next()">次の問題 ▶</button>
    </div>
  </div>

  <div id="result" class="card hidden">
    <div class="score" id="finalScore">0 / 0<small id="finalPct"></small></div>
    <button class="btn primary" onclick="location.reload()">トップに戻る</button>
    <button class="btn sub" id="retryWrong" onclick="start('wrong')">間違えた論点を解き直す</button>
    <div id="reviewList"></div>
  </div>

  <footer>奥様の合格を応援しています。学習用の自作演習ツールです（最終的な正誤は公式テキストでご確認ください）。</footer>
</div>

<script>
/* 各論点：o=正しい文(正答〇)/oe=その解説、x=誤った文(正答×)/xe=その解説。cはテキストの項目名 */
const CONCEPTS = [
/* 1 テクニカル分析とは ×3 */
{c:"テクニカル分析とは",o:"テクニカル分析は、過去の価格や出来高などの市場データから将来の値動きを予測しようとする手法である。",oe:"値動き（チャート）そのものを分析対象とする。",x:"テクニカル分析は、企業の財務諸表を分析して本質的価値を測る手法である。",xe:"それはファンダメンタルズ分析。テクニカルは値動きを対象とする。"},
{c:"テクニカル分析とは",o:"テクニカル分析の前提の一つに『市場の動き（価格）はすべての材料を織り込む』がある。",oe:"あらゆる情報は価格に反映されているとみなす大前提。",x:"テクニカル分析は、価格はあらゆる情報と無関係にランダムに動くことを前提とする。",xe:"それはランダムウォーク理論で、むしろテクニカルへの批判側の考え方。"},
{c:"テクニカル分析とは",o:"テクニカル分析の前提に『歴史は繰り返す（値動きのパターンは再現する）』がある。",oe:"投資家心理が似た局面で似たパターンを生むとみなす。",x:"テクニカル分析は、過去のパターンは二度と再現しないことを前提とする。",xe:"逆。パターンは繰り返すという前提に立つ。"},
/* 2 歴史 ×2 */
{c:"歴史",o:"日本のローソク足は、江戸時代の米相場（本間宗久らに由来とされる）で発展した古い分析手法である。",oe:"世界的にも歴史あるチャート手法として知られる。",x:"ローソク足は20世紀後半のアメリカで考案され、日本へ輸入された新しい手法である。",xe:"逆。ローソク足は日本発祥で、のちに欧米へ広まった。"},
{c:"歴史",o:"チャールズ・ダウは19世紀末にダウ理論の基礎を築き、近代テクニカル分析の祖の一人とされる。",oe:"ダウ・ジョーンズ社の創業者で、平均株価の考案者でもある。",x:"ダウ理論は21世紀に入って提唱された、最も新しいテクニカル理論である。",xe:"ダウ理論は19世紀末〜20世紀初頭に成立した古典理論。"},
/* 3 批判 ×2 */
{c:"批判",o:"効率的市場仮説（EMH）の立場からは、過去の価格情報で将来を予測するテクニカル分析は有効でないと批判される。",oe:"価格は入手可能な情報を即座に織り込むため超過収益は得られないとする立場。",x:"効率的市場仮説は、テクニカル分析が常に確実に超過収益を生むことを証明している。",xe:"逆。EMHはテクニカルに否定的な理論。"},
{c:"批判",o:"ランダムウォーク理論は、価格変動は予測不能でランダムだとし、テクニカル分析に否定的である。",oe:"明日の値動きはコイン投げのように予測不能とする立場。",x:"ランダムウォーク理論は、価格に明確な規則性があり予測可能だと主張する。",xe:"逆。価格はランダムで予測できないという主張。"},
/* 4 チャートの種類と構成要素 ×3 */
{c:"チャートの種類と構成要素",o:"ローソク足は、始値・高値・安値・終値の四本値で1本が構成される。",oe:"実体とヒゲで4つの価格情報を一度に表す。",x:"ローソク足は終値1つだけで構成され、高値や安値の情報は含まない。",xe:"終値だけを結ぶのはラインチャート。ローソク足は四本値。"},
{c:"チャートの種類と構成要素",o:"対数目盛（ログスケール）のチャートでは、同じ変化率（％）が同じ縦幅で表示される。",oe:"長期や値幅の大きい銘柄の比較に向く。",x:"対数目盛のチャートでは、同じ値幅（円）が常に同じ縦幅で表示される。",xe:"それは算術（普通）目盛の性質。対数目盛は変化率が等間隔。"},
{c:"チャートの種類と構成要素",o:"バーチャート（足）は、高値・安値を縦線で、始値・終値を左右の横棒で表す。",oe:"欧米で広く使われる四本値チャート。",x:"バーチャートは出来高だけを棒で表したチャートで、価格情報は含まない。",xe:"出来高棒とは別物。バーチャートは価格（四本値）を表す。"},
/* 5 トレンドとトレンドライン ×4 */
{c:"トレンドとトレンドライン",o:"上昇トレンドは、高値も安値もともに切り上がっていく状態をいう。",oe:"高値・安値の切り上げが上昇トレンドの定義。",x:"上昇トレンドは、高値も安値もともに切り下がっていく状態をいう。",xe:"それは下降トレンド。"},
{c:"トレンドとトレンドライン",o:"上昇トレンドラインは複数の安値を結んで引き、下値支持の目安になる。",oe:"上昇局面では安値を結んで支持線とする。",x:"上昇トレンドラインは複数の高値を結んで引くのが基本である。",xe:"高値を結ぶのは下降トレンドの抵抗線。上昇は安値結び。"},
{c:"トレンドとトレンドライン",o:"抵抗線（レジスタンス）を上抜けると、その水準は今度は支持線として働きやすい。",oe:"役割転換（ロールリバーサル）。",x:"抵抗線を上抜けても、その水準が支持線に変わることはない。",xe:"上抜け後は支持線に役割転換するのが一般的。"},
{c:"トレンドとトレンドライン",o:"トレンドラインは、接する回数が多く期間が長いほど信頼性が高いとされる。",oe:"多くの参加者が意識するほど機能しやすい。",x:"トレンドラインは、接する回数が少ないほど信頼性が高いとされる。",xe:"逆。接触回数が多いほど信頼性が高い。"},
/* 6 中長期パターン ×4 */
{c:"中長期パターン",o:"ヘッドアンドショルダーズ・トップ（三尊天井）は代表的な下落転換パターンである。",oe:"ネックライン割れで売りサイン。",x:"三尊天井（ヘッドアンドショルダーズ・トップ）は上昇継続を示す強気パターンである。",xe:"三尊天井は天井形成＝下落転換のサイン。"},
{c:"中長期パターン",o:"ダブルボトム（二重底）は安値圏に現れる上昇転換のパターンである。",oe:"二度同じ水準で下げ止まり反発する底打ち型。",x:"ダブルボトム（二重底）は高値圏に現れる下落転換のパターンである。",xe:"高値圏の天井型はダブルトップ。"},
{c:"中長期パターン",o:"三角保ち合い（トライアングル）は値幅が次第に収束し、いずれ放れて新トレンドが出る。",oe:"上値抵抗と下値支持が近づく形。",x:"三角保ち合いは値幅が次第に拡大していく形をいう。",xe:"収束していく形が三角保ち合い。拡大はむしろ別の形。"},
{c:"中長期パターン",o:"ヘッドアンドショルダーズの下値目標は、頭からネックラインまでの値幅を下に投影して測る。",oe:"パターンの高さを割れた方向に当てるのが基本。",x:"ヘッドアンドショルダーズの下値目標は、左肩の高さを上に足して計算する。",xe:"頭〜ネックの値幅を下に投影するのが一般的。"},
/* 7 短期パターン ×3 */
{c:"短期パターン",o:"フラッグやペナントは急騰・急落後の短い保ち合いで、多くは元のトレンドが継続する。",oe:"トレンド途中の小休止＝継続パターン。",x:"フラッグやペナントは出現すると必ずトレンドが反転する転換パターンである。",xe:"多くは継続パターン。反転ではない。"},
{c:"短期パターン",o:"保ち合い放れで出るブレイクアウェイギャップ（窓）は、新たなトレンド発生の勢いを示す。",oe:"放れ口の窓は方向性の強さを示す。",x:"すべての窓（ギャップ）は出現後すぐに埋められ、相場に影響を残さない。",xe:"埋まらない窓（ブレイクアウェイ等）もある。すべてではない。"},
{c:"短期パターン",o:"アイランドリバーサル（島状反転）は、上下を窓で囲まれた孤立した形で、転換のサインとされる。",oe:"高値・安値圏で出ると勢いの転換を示す。",x:"アイランドリバーサルはトレンドが力強く継続することを示すパターンである。",xe:"島状反転は転換のサイン。継続ではない。"},
/* 8 ローソク足 ×5 */
{c:"ローソク足",o:"陽線は、終値が始値より高いローソク足である。",oe:"陽線＝上昇、陰線＝下落。",x:"陽線は、終値が始値より低いローソク足である。",xe:"それは陰線。終値＞始値が陽線。"},
{c:"ローソク足",o:"安値圏で長い下ヒゲをもつカラカサ（ハンマー）は、下げ止まり・反転のサインとされる。",oe:"売られた後に買い戻された跡＝反転示唆。",x:"安値圏での長い下ヒゲは、さらなる下落の加速を示す弱気サインである。",xe:"安値圏の長い下ヒゲは反転のサイン。"},
{c:"ローソク足",o:"包み線（抱き線）は、前日の実体を当日の実体が包み込む形で、転換のサインとされる。",oe:"エンゴルフィング。勢いの転換を示す。",x:"包み線とは、当日の実体が前日の実体の内側に完全に収まる形をいう。",xe:"それははらみ線。包み線は逆に前日を包み込む。"},
{c:"ローソク足",o:"十字線（同事線）は始値と終値がほぼ同値で、買い売りの拮抗・迷いを示す。",oe:"トレンドの転換点で出やすい。",x:"十字線は実体が非常に長く、強い一方向の勢いを示すローソク足である。",xe:"実体が長いのは大陽線・大陰線。十字線は実体がほぼない。"},
{c:"ローソク足",o:"宵の明星（三つ星）は高値圏で天井・下落転換を示す組み合わせである。",oe:"大陽線→小実体→大陰線で天井を示す。",x:"宵の明星は安値圏で底打ち・上昇転換を示す組み合わせである。",xe:"安値圏の底打ちは明けの明星。宵の明星は天井側。"},
/* 9 ダウ理論 ×4 */
{c:"ダウ理論",o:"ダウ理論はトレンドを主要・二次・小（短期）の3つに分類する。",oe:"期間の異なる3種のトレンドが重なるとみる。",x:"ダウ理論はトレンドを上昇と下降の2つにのみ分類する。",xe:"期間で主要・二次・小の3つに分ける。"},
{c:"ダウ理論",o:"ダウ理論では、明確な転換シグナルが出るまで現行トレンドは継続するとみなす。",oe:"慣性のように扱う基本法則。",x:"ダウ理論では、トレンドは毎日のように反転を繰り返すとみなす。",xe:"転換シグナルが出るまで継続するとみる。"},
{c:"ダウ理論",o:"ダウ理論では、トレンドは出来高を伴って確認されるべきとされる。",oe:"トレンド方向で出来高増、逆行で減が理想。",x:"ダウ理論では、出来高は分析にまったく関係しないとされる。",xe:"出来高はトレンド確認の重要な材料。"},
{c:"ダウ理論",o:"ダウ理論には、二つの主要平均が互いに同方向を確認し合うべきという相互確認の原則がある。",oe:"元来は工業株平均と鉄道株平均の確認。",x:"ダウ理論では、一つの平均だけでトレンドを確定でき、他平均との確認は不要とされる。",xe:"二つの平均の相互確認を重視する。"},
/* 10 エリオット波動理論 ×4 */
{c:"エリオット波動理論",o:"エリオット波動では、上昇は5つの推進波、調整は3つの修正波で1サイクルを構成する。",oe:"5波上昇＋3波下降の計8波。",x:"エリオット波動では、上昇3波・下降5波で1サイクルを構成する。",xe:"逆。推進5波＋修正3波。"},
{c:"エリオット波動理論",o:"推進5波のうち、第2波と第4波は調整（押し・戻り）の波である。",oe:"1・3・5波が上昇方向、特に3波が力強い。",x:"推進5波のうち、第2波と第4波が最も力強い上昇の波である。",xe:"2・4波は調整。上昇方向は1・3・5波。"},
{c:"エリオット波動理論",o:"エリオットの修正波はA・B・Cの3波で表される。",oe:"推進5波のあとA〜Cで調整する。",x:"エリオットの修正波はA〜Eの5波で表される。",xe:"修正波は3波（A・B・C）。"},
{c:"エリオット波動理論",o:"エリオット波動には、大きな波の中に同じ構造の小さな波が含まれるフラクタル性がある。",oe:"どの時間軸でも同じ5−3構造を内包する。",x:"エリオット波動の波は入れ子構造を持たず、時間軸ごとに形が全く異なる。",xe:"自己相似（フラクタル）の入れ子構造を持つ。"},
/* 11 ギャン理論 ×3 */
{c:"ギャン理論",o:"ギャン理論の1×1ライン（45度線）は、価格1単位と時間1単位が等しい最重要の角度とされる。",oe:"価格と時間の均衡を表す中心的なライン。",x:"ギャン理論の1×1ラインは、価格と時間が無関係であることを示す補助線である。",xe:"1×1は価格と時間が等しい最重要ライン。"},
{c:"ギャン理論",o:"ギャン理論は価格と時間の調和（バランス）を重視する。",oe:"時間と価格の対応関係から転換を読む。",x:"ギャン理論は出来高のみを分析対象とし、価格や時間は扱わない。",xe:"価格と時間の調和が中心。出来高専門ではない。"},
{c:"ギャン理論",o:"価格がギャンの1×1ラインの上にあれば強気、下にあれば弱気と判断する。",oe:"基準角度に対する位置で強弱を測る。",x:"価格がギャンの1×1ラインの上にあるときは弱気と判断する。",xe:"上にあれば強気。逆である。"},
/* 12 サイクル分析 ×3 */
{c:"サイクル分析",o:"サイクル分析は、相場の高値・安値が一定の時間的周期で繰り返す傾向に注目する。",oe:"日柄（時間）から転換時期を推測する。",x:"サイクル分析は、価格の絶対水準のみに注目し時間の周期は考えない。",xe:"時間の周期に注目するのがサイクル分析。"},
{c:"サイクル分析",o:"サイクル分析では、底から底、天井から天井までの期間で転換時期を推測する。",oe:"周期の繰り返しから次の転換を読む。",x:"サイクル分析では、出来高の大小だけで転換時期を決める。",xe:"出来高ではなく時間の周期で測る。"},
{c:"サイクル分析",o:"複数のサイクル（短期・中期・長期）が重なる時期は、転換が起きやすいとされる。",oe:"周期の合致点で動きが大きくなりやすい。",x:"複数のサイクルが重なる時期は、相場が最も動かなくなるとされる。",xe:"重なる時期はむしろ転換・大きな動きが起きやすい。"},
/* 13 ポイント＆フィギュア ×3 */
{c:"ポイント＆フィギュア",o:"ポイント＆フィギュアは時間の概念を持たず、一定以上の値動きがあったときだけ記録する。",oe:"横軸は時間ではなく転換の回数。",x:"ポイント＆フィギュアは一定時間ごとに必ず1つ記録していくチャートである。",xe:"時間ではなく値動きで記録する。"},
{c:"ポイント＆フィギュア",o:"P&Fでは上昇を×、下落を○で表し、一定の転換幅で列を変える。",oe:"×と○の列でトレンドを表現する。",x:"P&Fでは時間を横軸にとり、毎日1マスずつ右に進める。",xe:"時間軸はなく、転換が起きたときだけ列が変わる。"},
{c:"ポイント＆フィギュア",o:"P&Fは一定の転換幅に満たない逆行を無視し、細かなノイズを排除する。",oe:"微細な値動きを切り捨てトレンドを明確化。",x:"P&Fはどんな小さな値動きもすべて漏れなく記録する点に特徴がある。",xe:"逆。小さな値動きは記録せずノイズを除く。"},
/* 14 カギ足 ×2 */
{c:"カギ足",o:"カギ足は一定幅以上の逆行があったときに線を直角に折り返して描く、時間軸不問のチャートである。",oe:"転換時にカギ（直角）に折れる。",x:"カギ足は一定時間ごとに必ず折り返して描くチャートである。",xe:"時間ではなく値動き（逆行幅）で折り返す。"},
{c:"カギ足",o:"カギ足では陽転・陰転でトレンドの転換を判断する。",oe:"線の太さや肩・抜きで売買を読む。",x:"カギ足には陽転・陰転の概念がなく、トレンド判断には使えない。",xe:"陽転・陰転でトレンドを判断する。"},
/* 15 新値足 ×2 */
{c:"新値足",o:"新値足は、過去n本の高値・安値を更新したときだけ新しい足を描く。",oe:"代表は三本新値足。微動を切り捨てる。",x:"新値足は、毎日必ず1本ずつ新しい足を描き加えていく。",xe:"新値を更新したときだけ足が増える。"},
{c:"新値足",o:"三本新値足では、陽転・陰転がトレンド転換のサインとされる。",oe:"反対色の足が出ると転換を示す。",x:"三本新値足は微細な値動きをすべて描くためノイズが多い。",xe:"逆。新値更新時のみ描くのでノイズが少ない。"},
/* 16 一目均衡表 ×5 */
{c:"一目均衡表",o:"一目均衡表は転換線・基準線・先行スパン1・先行スパン2・遅行スパンの5本で構成される。",oe:"5本の線と雲で時間・値幅・波動を分析。",x:"一目均衡表は移動平均線3本だけで構成される。",xe:"転換線・基準線・先行スパン2本・遅行スパンの5本。"},
{c:"一目均衡表",o:"基準線は、過去26日間の高値と安値の中値で算出する。",oe:"中期のトレンドの方向を示す。",x:"基準線は、過去9日間の高値と安値の中値で算出する。",xe:"9日の中値は転換線。基準線は26日。"},
{c:"一目均衡表",o:"先行スパン1と2に挟まれた領域を雲（抵抗帯）といい、支持・抵抗として働く。",oe:"価格が雲を抜けると強弱が転換しやすい。",x:"先行スパン1と2に挟まれた領域は遅行スパンと呼ばれる。",xe:"その領域は雲。遅行スパンは終値を過去にずらした線。"},
{c:"一目均衡表",o:"価格が雲の上にあるときは強気、雲の下にあるときは弱気と判断する。",oe:"雲が支持帯・抵抗帯として働く。",x:"価格が雲の上にあるときは弱気、下にあるときは強気と判断する。",xe:"逆。雲の上＝強気、雲の下＝弱気。"},
{c:"一目均衡表",o:"三役好転（転換線が基準線を上抜け・遅行スパンが価格を上抜け・価格が雲の上）は強い買いサインである。",oe:"3条件が揃った最も強い買い。",x:"三役好転は最も強い売りサインである。",xe:"三役好転は強い買い。強い売りは三役逆転。"},
/* 17 相対株価 ×2 */
{c:"相対株価",o:"相対株価（レラティブ・ストレングス）は、個別銘柄を市場指数などと比較して相対的な強弱を見るものである。",oe:"指数より強いか弱いかを測る。",x:"相対株価（レラティブ・ストレングス）は、RSIと同じく0〜100で買われ過ぎ・売られ過ぎを示す指標である。",xe:"RSI（相対力指数）とは別物。相対株価は対指数の強弱比較。"},
{c:"相対株価",o:"相対株価の線が上昇しているときは、その銘柄が比較対象（指数）より強い値動きをしていることを示す。",oe:"市場をアウトパフォームしている状態。",x:"相対株価の線が上昇していても、それは銘柄が指数より弱いことを意味する。",xe:"線の上昇は指数より強いことを示す。"},
/* 18 移動平均 ×5 */
{c:"移動平均",o:"単純移動平均（SMA）は、対象期間の終値を合計し期間数で割って算出する。",oe:"最も基本的な移動平均。",x:"単純移動平均（SMA）は、直近の価格にだけ重みを付けて算出する。",xe:"直近重視はEMAやWMA。SMAは単純平均。"},
{c:"移動平均",o:"ゴールデンクロスは、短期線が長期線を下から上に抜ける買いシグナルである。",oe:"上抜けが買い、下抜けが売り。",x:"ゴールデンクロスは、短期線が長期線を上から下に抜ける売りシグナルである。",xe:"それはデッドクロス。ゴールデンクロスは下から上。"},
{c:"移動平均",o:"指数平滑移動平均（EMA）は、直近の価格により大きな比重を置くため反応が速い。",oe:"新しいデータほど重みを大きくする。",x:"指数平滑移動平均（EMA）は、古い価格ほど重みを大きくする。",xe:"逆。直近の価格を重視する。"},
{c:"移動平均",o:"移動平均は、価格に遅れて反応する遅行性（ラグ）という弱点を持つ。",oe:"過去の平均ゆえ転換に遅れる。",x:"移動平均は、価格に先行して動くため転換をいち早く先取りできる。",xe:"移動平均は遅行指標。先行はしない。"},
{c:"移動平均",o:"グランビルの法則は、株価と移動平均の位置関係から売買タイミングを8つに分類したものである。",oe:"買い4・売り4の計8法則。",x:"グランビルの法則は、出来高だけで売買タイミングを2つに分類したものである。",xe:"株価と移動平均の関係で8パターンに分類する。"},
/* 19 バンド ×3 */
{c:"バンド",o:"ボリンジャーバンドは、移動平均線とその上下に標準偏差（σ）を加減した線で構成される。",oe:"±1σ・±2σ等で価格のばらつきを示す。",x:"ボリンジャーバンドは、移動平均線と出来高の累計で構成される。",xe:"出来高ではなく標準偏差で上下バンドを引く。"},
{c:"バンド",o:"統計上、価格が±2σの範囲に収まる確率はおよそ95%とされる。",oe:"±1σ約68%、±2σ約95%、±3σ約99.7%。",x:"統計上、価格が±2σの範囲に収まる確率はおよそ50%とされる。",xe:"±2σは約95%。50%は誤り。"},
{c:"バンド",o:"バンド幅が狭まるスクイーズはボラティリティ低下を示し、その後の拡大でトレンドが出やすい。",oe:"エネルギー蓄積→放出（エクスパンション）。",x:"バンド幅が狭まるスクイーズは、ボラティリティが極大化した状態を示す。",xe:"スクイーズは変動率の低下。極大化はエクスパンション。"},
/* 20 オシレーター ×6 */
{c:"オシレーター",o:"RSIは0〜100で推移し、一般に70%以上で買われ過ぎ、30%以下で売られ過ぎとされる。",oe:"ワイルダー考案の代表的オシレーター。",x:"RSIは−100〜+100で推移し、0が中立を示す指標である。",xe:"−100〜+100はRCI等。RSIは0〜100。"},
{c:"オシレーター",o:"オシレーター系指標は、強いトレンド相場より保ち合い（レンジ）相場で有効とされる。",oe:"トレンド下では張り付きダマシが増える。",x:"オシレーター系指標は、強いトレンド相場でこそ最も信頼性が高い。",xe:"逆。レンジで有効、強トレンドでは弱い。"},
{c:"オシレーター",o:"MACDは、短期EMAから長期EMAを引いたMACD線と、その移動平均のシグナル線で構成される。",oe:"トレンドとオシレーターの両性格を持つ。",x:"MACDは、2本の単純移動平均の出来高加重平均で構成される。",xe:"EMAの差（MACD線）とシグナル線で構成する。"},
{c:"オシレーター",o:"価格は高値更新なのにオシレーターは高値を切り下げる逆行現象（ダイバージェンス）は、転換の前兆とされる。",oe:"勢いの衰えを示す重要サイン。",x:"ダイバージェンスとは、価格とオシレーターが完全に一致して動く状態をいう。",xe:"一致ではなく逆行（食い違い）がダイバージェンス。"},
{c:"オシレーター",o:"ストキャスティクスの%Kは速い線、%Dはそれを平滑化した遅い線である。",oe:"%Dは%Kの移動平均。",x:"ストキャスティクスの%Dが速い線、%Kが遅い線である。",xe:"逆。%Kが速い、%Dが遅い。"},
{c:"オシレーター",o:"ADXが上昇しているときは、トレンドの方向性が強いことを示す。",oe:"ADXは方向性の強さ（トレンドの有無）を測る。",x:"ADXが上昇しているときは、トレンドが弱まり方向感がないことを示す。",xe:"ADX上昇＝トレンドが強い。低下が弱まり。"},
/* 21 出来高 ×4 */
{c:"出来高",o:"一般に、上昇局面では出来高も増加するのが健全とされる。",oe:"価格と出来高が同方向に増えるのが理想。",x:"一般に、上昇局面では出来高が減少するほど上昇は強く健全とされる。",xe:"上昇で出来高が細るのは勢い減退のサイン。"},
{c:"出来高",o:"OBVは、上昇日の出来高を加算し下落日の出来高を減算して累計する指標である。",oe:"資金の流出入を出来高で測る。",x:"OBVは、終値だけを累計し出来高を一切使わない指標である。",xe:"OBVは出来高を加減算する指標。"},
{c:"出来高",o:"価格帯別出来高は、出来高の多い価格帯が支持・抵抗になりやすいことを示す。",oe:"しこり（戻り売り圧力）の分析に使う。",x:"価格帯別出来高は、各日の始値だけを並べたものである。",xe:"価格帯ごとの売買量を示すもの。始値の羅列ではない。"},
{c:"出来高",o:"天井圏での極端な出来高急増（クライマックス）は、転換の警戒サインになりうる。",oe:"需給の最終局面を示すことがある。",x:"天井圏での出来高急増は、上昇がさらに長く続く安全なサインである。",xe:"極端な急増はむしろ転換を警戒すべき局面。"},
/* 22 市場趨勢 ×2 */
{c:"市場趨勢",o:"騰落レシオは値上がり銘柄数を値下がり銘柄数で割った指標で、一般に120%以上で買われ過ぎ、70%以下で売られ過ぎとされる。",oe:"市場全体の過熱・冷え込みを測る代表的指標。",x:"騰落レシオは個別銘柄の終値の平均で、100%を超えると売られ過ぎを示す。",xe:"値上がり・値下がり銘柄数の比。終値平均ではない。"},
{c:"市場趨勢",o:"新高値銘柄数が新安値銘柄数を大きく上回る状態は、市場全体が強いことを示す。",oe:"市場の広がり（ブレッドス）の指標。",x:"新高値銘柄が増え新安値銘柄が減るのは、市場全体が弱まっているサインである。",xe:"新高値増・新安値減は市場が強いサイン。"},
/* 23 ピボット ×2 */
{c:"ピボット",o:"ピボットポイントは、前日の高値・安値・終値から算出し、当日の支持・抵抗の目安に使う。",oe:"デイトレ等で当日の節目を測る。",x:"ピボットポイントは、翌日の決算予想から算出する指標である。",xe:"前日の高値・安値・終値から計算する。"},
{c:"ピボット",o:"ピボットを基準に、その上に抵抗線（R1・R2）、下に支持線（S1・S2）を計算する。",oe:"中心値から上下に節目を展開する。",x:"ピボットは支持線のみを計算し、抵抗線は算出しない。",xe:"上に抵抗線、下に支持線の両方を出す。"},
/* 24 貸借倍率 ×2 */
{c:"貸借倍率",o:"貸借倍率が1倍を下回る（売り残が買い残を上回る）状態は、買い戻し（踏み上げ）が期待され取り組み好転とされる。",oe:"売り長は将来の買い戻し需要を生む。",x:"貸借倍率が1倍を下回ると、上値の戻り売り圧力が増して取り組みが悪化するとされる。",xe:"1倍割れ（売り長）は踏み上げ期待＝好転。"},
{c:"貸借倍率",o:"信用買い残が多い（貸借倍率が高い）ほど、将来の戻り売り圧力となり上値が重いとされる。",oe:"買い残はいずれ反対売買（売り）が必要。",x:"信用買い残が多いほど将来の買い需要が増え、上値が軽くなるとされる。",xe:"買い残は将来の売り圧力。上値は重くなる。"},
/* 25 主な投資対象と市場 ×1 */
{c:"主な投資対象と市場",o:"株式・債券・為替・商品（コモディティ）など、テクニカル分析は値動きのある幅広い市場に応用できる。",oe:"需給と心理が働く市場全般に適用可能。",x:"テクニカル分析は株式市場のみに適用でき、為替や商品市場には一切使えない。",xe:"為替・商品・債券など幅広く応用できる。"},
/* 26 国内市場と海外市場 ×1 */
{c:"国内市場と海外市場",o:"日本株は、米国市場（NYダウ・ナスダック等）の動向や為替の影響を強く受けることがある。",oe:"海外市場との連動を踏まえた分析が重要。",x:"日本株は国内要因のみで動き、海外市場や為替の影響はほとんど受けない。",xe:"日本株は海外市場・為替の影響を大きく受ける。"},
/* 27 市場間分析 ×2 */
{c:"市場間分析",o:"市場間分析では、株式・債券・商品・為替など異なる市場の相互関係に着目する。",oe:"マーフィーらが体系化した分析手法。",x:"市場間分析とは、同一銘柄を複数の取引所で比較して裁定機会を探す手法である。",xe:"それは裁定取引に近い別概念。市場間分析は異市場の相関を見る。"},
{c:"市場間分析",o:"一般に、金利（債券利回り）の動きは株式や為替など他市場へ波及するとされる。",oe:"金利・債券・株・商品・為替は相互に影響し合う。",x:"債券・金利の動きは、他の市場（株式・為替）とは完全に独立しており影響し合わない。",xe:"各市場は相互に影響し合う。独立ではない。"},
/* 28 業種循環 ×2 */
{c:"業種循環",o:"業種循環（セクターローテーション）では、景気の局面に応じて物色される業種が移り変わるとされる。",oe:"景気サイクルと連動した資金移動。",x:"業種循環とは、常に同じ業種だけが景気と無関係に買われ続ける現象をいう。",xe:"景気局面に応じて主役の業種が入れ替わる。"},
{c:"業種循環",o:"景気後退・不況局面では、食品・医薬・公益などのディフェンシブ株が相対的に物色されやすい。",oe:"業績が景気に左右されにくい業種が選好される。",x:"景気後退局面では、素材・資本財などの景気敏感株が最も買われやすい。",xe:"後退局面はディフェンシブ株が相対的に強い。"},
/* 29 代表的な指標 ×3 */
{c:"代表的な指標",o:"TOPIXは時価総額加重型の指数で、時価総額の大きい銘柄ほど指数への影響が大きい。",oe:"東証全体の値動きを時価総額で加重。",x:"TOPIXは株価平均型の指数で、株価の高い値がさ株の影響を最も受ける。",xe:"値がさ株の影響が大きいのは日経平均。TOPIXは時価総額加重。"},
{c:"代表的な指標",o:"日経平均株価は株価平均型のため、株価の高い『値がさ株』の値動きの影響を受けやすい。",oe:"225銘柄の株価をもとに算出（除数調整）。",x:"日経平均株価は時価総額加重型で、時価総額の大きい銘柄ほど影響が大きい。",xe:"時価総額加重はTOPIX。日経平均は株価平均型。"},

/* ===== ロジック ===== */
let pool=[], idx=0, correct=0, answered=false, wrongThisRun=[];
const WRONG_KEY="ta_wrong_v2";

function getStoredWrong(){ try{return JSON.parse(localStorage.getItem(WRONG_KEY))||[];}catch(e){return [];} }
function saveStoredWrong(arr){ localStorage.setItem(WRONG_KEY, JSON.stringify([...new Set(arr)])); }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function item(con,i,ver){
  return ver==='o'
    ? {c:con.c, q:con.o, a:true,  e:con.oe, _i:i}
    : {c:con.c, q:con.x, a:false, e:con.xe, _i:i};
}
function randVer(){ return Math.random()<0.5 ? 'o':'x'; }

window.onload=()=>{
  const w=getStoredWrong();
  const btn=document.getElementById('wrongBtn');
  btn.textContent=`④ 前回間違えた論点だけ（${w.length}件）`;
  if(w.length===0) btn.disabled=true;
};

function start(mode){
  if(mode==='flip'){
    pool = shuffle(CONCEPTS.map((c,i)=>item(c,i,randVer())));
  }else if(mode==='all200'){
    const all=[];
    CONCEPTS.forEach((c,i)=>{ all.push(item(c,i,'o')); all.push(item(c,i,'x')); });
    pool = shuffle(all);
  }else if(mode==='mini'){
    const picks = shuffle(CONCEPTS.map((c,i)=>({c,i}))).slice(0,20);
    pool = picks.map(p=>item(p.c,p.i,randVer()));
  }else if(mode==='wrong'){
    const w=getStoredWrong();
    const items = CONCEPTS.map((c,i)=>({c,i})).filter(p=>w.includes(p.i));
    if(items.length===0){ alert("間違えた論点はありません。"); return; }
    pool = shuffle(items.map(p=>item(p.c,p.i,randVer())));
  }
  idx=0; correct=0; wrongThisRun=[];
  document.getElementById('home').classList.add('hidden');
  document.getElementById('result').classList.add('hidden');
  document.getElementById('quiz').classList.remove('hidden');
  render();
}

function render(){
  answered=false;
  const q=pool[idx];
  document.getElementById('counter').textContent=`${idx+1} / ${pool.length}`;
  document.getElementById('liveScore').textContent=`正解 ${correct}`;
  document.getElementById('prog').style.width=`${(idx)/pool.length*100}%`;
  document.getElementById('cat').textContent=q.c;
  document.getElementById('qtext').textContent=q.q;
  document.getElementById('feedback').classList.add('hidden');
  document.getElementById('bMaru').disabled=false;
  document.getElementById('bBatsu').disabled=false;
}

function answer(userTrue){
  if(answered) return;
  answered=true;
  const q=pool[idx];
  const isCorrect = (userTrue===q.a);
  document.getElementById('bMaru').disabled=true;
  document.getElementById('bBatsu').disabled=true;

  const judge=document.getElementById('judge');
  if(isCorrect){ correct++; judge.textContent="正解！"; judge.className="judge ok"; }
  else{ judge.textContent="不正解…"; judge.className="judge ng"; wrongThisRun.push(q); }
  document.getElementById('liveScore').textContent=`正解 ${correct}`;

  const ans = q.a ? "正答：〇（正しい）" : "正答：×（誤り）";
  document.getElementById('ansLine').innerHTML=`<span class="${isCorrect?'right':'wrong'}">${ans}</span>`;
  document.getElementById('expText').innerHTML=`<b>解説：</b>${q.e}`;
  document.getElementById('feedback').classList.remove('hidden');
  document.getElementById('prog').style.width=`${(idx+1)/pool.length*100}%`;
}

function next(){ idx++; if(idx>=pool.length){ finish(); return; } render(); }

function finish(){
  document.getElementById('quiz').classList.add('hidden');
  document.getElementById('result').classList.remove('hidden');
  const pct=Math.round(correct/pool.length*100);
  document.getElementById('finalScore').innerHTML=`${correct} / ${pool.length}<small>正答率 ${pct}％</small>`;

  // 間違えた論点を保存（正解した論点は除外）
  const stored=new Set(getStoredWrong());
  const wrongIds=wrongThisRun.map(q=>q._i);
  wrongIds.forEach(i=>stored.add(i));
  pool.forEach(q=>{ if(!wrongIds.includes(q._i)) stored.delete(q._i); });
  saveStoredWrong([...stored]);

  const rl=document.getElementById('reviewList');
  if(wrongThisRun.length===0){
    rl.innerHTML=`<div class="review-item" style="border:none;color:var(--ok);font-weight:700;">全問正解！素晴らしい 🎉</div>`;
    document.getElementById('retryWrong').classList.add('hidden');
  }else{
    document.getElementById('retryWrong').classList.remove('hidden');
    let html=`<div style="margin-top:14px;font-weight:700;color:var(--ng);">間違えた問題（${wrongThisRun.length}問）</div>`;
    wrongThisRun.forEach(q=>{
      html+=`<div class="review-item">
        <div class="qq">${q.q}</div>
        <div class="meta">${q.c}｜正答：${q.a?'〇':'×'}</div>
        <div style="margin-top:6px;font-size:.85rem;">${q.e}</div>
      </div>`;
    });
    rl.innerHTML=html;
  }
}
</script>
